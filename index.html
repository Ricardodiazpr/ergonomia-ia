<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evaluacion Ergonomica IA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f2;color:#1a1a18;font-size:15px}
header{background:#185FA5;color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:17px;font-weight:600}
header p{font-size:11px;opacity:.8;margin-top:2px}
.lang-switch{display:flex;background:rgba(255,255,255,0.2);border-radius:999px;padding:3px;gap:2px}
.lang-btn{padding:5px 12px;border-radius:999px;border:none;background:transparent;color:#fff;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .15s}
.lang-btn.on{background:#fff;color:#185FA5}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:12px;border:1px solid #e0deda;margin-bottom:14px;overflow:hidden}
.card-head{padding:11px 16px;border-bottom:1px solid #e0deda;font-size:13px;font-weight:600;color:#5f5e5a}
.card-body{padding:14px 16px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:500px){.grid2{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:#888;font-weight:500}
.field input{padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fafaf8;font-size:13px;font-family:inherit;color:#1a1a18}
.field input:focus{outline:none;border-color:#378ADD}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 15px;border-radius:999px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;font-weight:500;color:#666;font-family:inherit}
.tab.on{background:#E6F1FB;color:#185FA5;border-color:#378ADD}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.twocol{grid-template-columns:1fr}}
.drop{border:2px dashed #ccc;border-radius:12px;min-height:190px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;position:relative;padding:16px;text-align:center}
.drop:hover{border-color:#378ADD;background:#E6F1FB}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-ico{font-size:38px}
.drop-lbl{font-size:13px;color:#666;line-height:1.5}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn{padding:8px 15px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;color:#333}
.btn:hover{background:#f5f5f2}
.btn-blue{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-blue:hover{background:#0C447C}
.btn-blue:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-green:hover{background:#2a5008}
.preview-wrap{position:relative;background:#000;border-radius:10px;overflow:hidden;min-height:160px;display:flex;align-items:center;justify-content:center}
.preview-wrap img,.preview-wrap video{width:100%;max-height:380px;object-fit:contain;display:block}
.skeleton-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.tag{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:2px 8px;border-radius:999px;z-index:10}
.legend{display:flex;gap:12px;padding:8px 14px;background:#fafaf8;border-top:1px solid #eee;font-size:11px;color:#666;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.empty{text-align:center;padding:28px 16px;color:#999;font-size:13px;line-height:1.8}
.skel{background:#f0efe9;border-radius:6px;height:13px;margin-bottom:8px;animation:pulse 1.2s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.score-big{font-size:38px;font-weight:700}
.badge{display:inline-flex;padding:3px 12px;border-radius:999px;font-size:12px;font-weight:600}
.ok{background:#EAF3DE;color:#3B6D11;border:1px solid #97C459}
.warn{background:#FAEEDA;color:#854F0B;border:1px solid #EF9F27}
.bad{background:#FCEBEB;color:#A32D2D;border:1px solid #E24B4A}
.bar-track{flex:1;height:9px;background:#eee;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .5s}
.seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.seg{background:#fafaf8;border-radius:8px;padding:9px 12px}
.seg-lbl{font-size:11px;color:#888;margin-bottom:4px;text-transform:capitalize}
.seg-row{display:flex;align-items:center;gap:8px}
.seg-val{font-size:13px;font-weight:600;min-width:34px}
.findings{margin-bottom:12px}
.findings h4{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px}
.fi-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.fi{display:flex;gap:7px;font-size:12px;line-height:1.5}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.snap-strip{display:flex;gap:6px;overflow-x:auto;padding:8px 16px;border-top:1px solid #eee}
.snap{width:60px;height:48px;object-fit:cover;border-radius:6px;cursor:pointer;flex-shrink:0}
.cam-wrap{padding:12px}
.cam-wrap video{width:100%;border-radius:10px;background:#000;max-height:220px}
</style>
</head>
<body>
<header>
  <div>
    <h1 id="t-title">Evaluacion Ergonomica con IA</h1>
    <p id="t-subtitle">Analisis postural por imagen o video</p>
  </div>
  <div class="lang-switch">
    <button class="lang-btn on" id="btn-es" onclick="setLang('es')">ES</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
</header>
<div class="wrap">
  <div class="card">
    <div class="card-head" id="t-worker">Datos del trabajador</div>
    <div class="card-body">
      <div class="grid2">
        <div class="field"><label id="t-name">Nombre</label><input id="wname"/></div>
        <div class="field"><label id="t-role">Puesto</label><input id="wrole"/></div>
        <div class="field"><label id="t-eval">Evaluador</label><input id="weval"/></div>
        <div class="field"><label id="t-date">Fecha</label><input id="wdate" type="date"/></div>
      </div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-oficina" onclick="setArea('oficina',this)">Oficina</button>
    <button class="tab" id="tab-manufactura" onclick="setArea('manufactura',this)">Manufactura</button>
    <button class="tab" id="tab-almacen" onclick="setArea('almacen',this)">Almacen</button>
    <button class="tab" id="tab-mecanica" onclick="setArea('mecanica',this)">Mecanica</button>
  </div>
  <div class="twocol">
    <div>
      <div class="card">
        <div class="card-head" id="t-capture">Captura de postura</div>
        <div id="idle-section">
          <div class="card-body" style="padding-bottom:0">
            <div class="drop" id="drop-zone">
              <input type="file" id="file-in" accept="image/*,video/*" onchange="handleFile(this.files[0])"/>
              <div class="drop-ico">🖼️</div>
              <div class="drop-lbl" id="t-drop">Arrastra foto o video aqui<br>o usa los botones</div>
            </div>
          </div>
          <div class="card-body" style="padding-top:8px">
            <div class="btn-row">
              <button class="btn" id="t-cam" onclick="openCam()">📸 Camara</button>
              <button class="btn" id="t-file" onclick="document.getElementById('file-in').click()">📂 Archivo</button>
            </div>
          </div>
        </div>
        <div id="cam-section" style="display:none" class="cam-wrap">
          <video id="cam-vid" autoplay playsinline></video>
          <div class="btn-row" style="margin-top:8px;justify-content:center">
            <button class="btn btn-blue" id="t-take" onclick="takePic()">📸 Tomar foto</button>
            <button class="btn" id="t-cancel" onclick="stopCam()">Cancelar</button>
          </div>
          <canvas id="cam-canvas" style="display:none"></canvas>
        </div>
        <div id="prev-section" style="display:none">
          <div class="card-body" style="padding-bottom:0">
            <div class="preview-wrap" id="prev-box">
              <span class="tag" id="media-tag">foto</span>
              <svg class="skeleton-overlay" id="skeleton-svg" style="display:none"></svg>
            </div>
          </div>
          <div class="legend" id="legend" style="display:none">
            <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div><span id="t-lg-ok">Correcto</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div><span id="t-lg-warn">A mejorar</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div><span id="t-lg-bad">Critico</span></div>
          </div>
          <div id="snaps-wrap" style="display:none">
            <div class="snap-strip" id="snap-list"></div>
          </div>
          <div class="card-body" style="padding-top:8px">
            <div class="btn-row">
              <button class="btn" id="t-remove" onclick="resetMedia()">Quitar</button>
              <button class="btn" id="btn-frame" onclick="captureFrame()" style="display:none">Capturar frame</button>
              <button class="btn btn-blue" id="btn-analyze" onclick="analyze()" disabled>Analizar con IA</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-head" id="t-result">Resultado IA</div>
        <div id="res-idle" class="empty" id="t-empty">
          <span id="t-empty-text">Sube una foto o video y presiona <strong>Analizar con IA</strong></span>
        </div>
        <div id="res-loading" style="display:none;padding:16px">
          <div class="skel" style="width:100%;height:10px"></div>
          <div class="skel" style="width:55%;height:22px;margin:10px 0"></div>
          <div class="skel" style="width:100%"></div>
          <div class="skel" style="width:75%"></div>
          <div class="skel" style="width:90%;margin-top:12px"></div>
        </div>
        <div id="res-content" style="display:none;padding:16px"></div>
      </div>
    </div>
  </div>
  <div class="card" id="hist-card" style="display:none">
    <div class="card-head" id="t-history">Historial de sesion</div>
    <div id="hist-list"></div>
  </div>
</div>
<script>
var area='oficina',dataUrl=null,isVideo=false,snaps=[],camStream=null,hist=[],lastResult=null,lang='es';

var T={
  es:{title:'Evaluacion Ergonomica con IA',subtitle:'Analisis postural por imagen o video',worker:'Datos del trabajador',name:'Nombre',role:'Puesto',eval:'Evaluador',date:'Fecha',oficina:'Oficina',manufactura:'Manufactura',almacen:'Almacen',mecanica:'Mecanica',capture:'Captura de postura',drop:'Arrastra foto o video aqui<br>o usa los botones',cam:'📸 Camara',file:'📂 Archivo',take:'📸 Tomar foto',cancel:'Cancelar',remove:'Quitar',frame:'Capturar frame',analyze:'Analizar con IA',analyzing:'Analizando...',result:'Resultado IA',empty:'Sube una foto o video y presiona <strong>Analizar con IA</strong>',history:'Historial de sesion',lgOk:'Correcto',lgWarn:'A mejorar',lgBad:'Critico',pdf:'📄 Descargar PDF',critical:'Hallazgos criticos',moderate:'A mejorar',positive:'Aspectos positivos',recommendations:'Recomendaciones',none:'Ninguno',pdfTitle:'INFORME DE EVALUACION ERGONOMICA',pdfSubtitle:'Analisis postural con Inteligencia Artificial',pdfWorker:'Datos del trabajador',pdfName:'Nombre',pdfRole:'Puesto',pdfEval:'Evaluador',pdfDate:'Fecha',pdfArea:'Area',pdfLegend:'Verde: postura correcta  |  Amarillo: a mejorar  |  Rojo: critico',pdfSegments:'Evaluacion por segmento corporal',pdfFooter:'Generado por Sistema de Evaluacion Ergonomica con IA',errorConn:'Error de conexion.',errorProc:'No se pudo procesar.',errorRetry:'Intenta otra imagen mas clara.',workerDef:'Trabajador',noNameDef:'Sin nombre'},
  en:{title:'Ergonomic Evaluation with AI',subtitle:'Postural analysis by image or video',worker:'Worker information',name:'Name',role:'Position',eval:'Evaluator',date:'Date',oficina:'Office',manufactura:'Manufacturing',almacen:'Warehouse',mecanica:'Mechanic',capture:'Posture capture',drop:'Drag photo or video here<br>or use the buttons',cam:'📸 Camera',file:'📂 File',take:'📸 Take photo',cancel:'Cancel',remove:'Remove',frame:'Capture frame',analyze:'Analyze with AI',analyzing:'Analyzing...',result:'AI Result',empty:'Upload a photo or video and press <strong>Analyze with AI</strong>',history:'Session history',lgOk:'Correct',lgWarn:'To improve',lgBad:'Critical',pdf:'📄 Download PDF',critical:'Critical findings',moderate:'To improve',positive:'Positive aspects',recommendations:'Recommendations',none:'None',pdfTitle:'ERGONOMIC EVALUATION REPORT',pdfSubtitle:'Postural analysis with Artificial Intelligence',pdfWorker:'Worker information',pdfName:'Name',pdfRole:'Position',pdfEval:'Evaluator',pdfDate:'Date',pdfArea:'Area',pdfLegend:'Green: correct posture  |  Yellow: to improve  |  Red: critical',pdfSegments:'Body segment evaluation',pdfFooter:'Generated by AI Ergonomic Evaluation System',errorConn:'Connection error.',errorProc:'Could not process.',errorRetry:'Try a clearer image.',workerDef:'Worker',noNameDef:'No name'}
};

var PLACEHOLDERS={
  es:{wname:'Nombre completo',wrole:'Ej: Operador',weval:'Tu nombre'},
  en:{wname:'Full name',wrole:'Ex: Operator',weval:'Your name'}
};

var SKELETON_INSTRUCTION_BASE='\n\nIMPORTANTE PARA EL ESQUELETO: Observa cuidadosamente si la persona esta SENTADA, DE PIE, AGACHADA, o en otra postura. Devuelve coordenadas REALES como porcentajes 0-100 de la imagen. Solo incluye articulaciones que sean VISIBLES en la imagen. Si una articulacion no se ve (ejemplo: piernas bajo escritorio, tobillos no visibles), OMITELA del JSON. NO inventes posiciones. Si esta sentado, las rodillas estaran flexionadas hacia adelante. Si la persona esta de espaldas, perfil, o parcialmente cubierta, marca solo lo visible. Color de cada articulacion: "verde" (correcta), "amarillo" (a mejorar), "rojo" (critica). Agrega "esqueleto" al JSON solo con las articulaciones visibles, ejemplo:\n"esqueleto":{"cabeza":{"x":50,"y":15,"color":"verde"},"cuello":{"x":50,"y":22,"color":"amarillo"},"hombro_izq":{"x":42,"y":28,"color":"verde"},"hombro_der":{"x":58,"y":28,"color":"verde"},"codo_der":{"x":62,"y":42,"color":"amarillo"}}\nLas articulaciones disponibles son: cabeza, cuello, hombro_izq, hombro_der, codo_izq, codo_der, muneca_izq, muneca_der, cadera_izq, cadera_der, rodilla_izq, rodilla_der, tobillo_izq, tobillo_der.';

var PROMPTS_ES={
  oficina:'Eres ergonomista certificado. Analiza imagen de trabajador en OFICINA. Usa medidas en PULGADAS (inches). Evalua: cuello (flexion <20 grados), hombros, codos (90 grados), munecas neutras, espalda con apoyo lumbar, cadera/rodillas (90 grados), pies apoyados. Distancia monitor 20-28 pulgadas. Responde UNICAMENTE con JSON valido sin markdown:\n{"puntuacion":85,"nivel":"Riesgo Bajo","resumen":"texto","hallazgos_criticos":["h1"],"hallazgos_moderados":["h1"],"puntos_positivos":["p1"],"recomendaciones":["r1"],"segmentos":{"cuello":75,"hombros":90,"codos":85,"tronco":80,"caderas":88,"munecas":70}}'+SKELETON_INSTRUCTION_BASE,
  manufactura:'Eres ergonomista certificado. Analiza imagen de trabajador en MANUFACTURA. Usa medidas en PULGADAS (inches) y LIBRAS (lbs). Evalua: cuello flexion <20 grados, tronco, brazos, munecas, postura de pie, zona de confort, manejo de carga (max 55 lbs hombres, 33 lbs mujeres). Responde UNICAMENTE con JSON valido sin markdown:\n{"puntuacion":85,"nivel":"Riesgo Bajo","resumen":"texto","hallazgos_criticos":["h1"],"hallazgos_moderados":["h1"],"puntos_positivos":["p1"],"recomendaciones":["r1"],"segmentos":{"cuello":75,"tronco":80,"brazos":85,"munecas":70,"postura_pie":88,"zona_confort":75}}'+SKELETON_INSTRUCTION_BASE,
  almacen:'Eres ergonomista certificado. Analiza imagen de trabajador en ALMACEN. Usa medidas en PULGADAS (inches) y LIBRAS (lbs). Evalua: tecnica de levantamiento, posicion de carga, torsion de tronco, cuello, rodillas, uso de equipos. Responde UNICAMENTE con JSON valido sin markdown:\n{"puntuacion":85,"nivel":"Riesgo Bajo","resumen":"texto","hallazgos_criticos":["h1"],"hallazgos_moderados":["h1"],"puntos_positivos":["p1"],"recomendaciones":["r1"],"segmentos":{"levantamiento":75,"posicion_carga":80,"tronco":85,"cuello":70,"rodillas":88,"postura_general":75}}'+SKELETON_INSTRUCTION_BASE,
  mecanica:'Eres ergonomista certificado. Analiza imagen de trabajador en MECANICA. Usa medidas en PULGADAS (inches) y LIBRAS (lbs). Evalua: postura de acceso, agarre de herramientas, muneca, tronco, cuclillas, brazos sobre cabeza, EPP. Responde UNICAMENTE con JSON valido sin markdown:\n{"puntuacion":85,"nivel":"Riesgo Bajo","resumen":"texto","hallazgos_criticos":["h1"],"hallazgos_moderados":["h1"],"puntos_positivos":["p1"],"recomendaciones":["r1"],"segmentos":{"acceso":75,"herramientas":80,"tronco":85,"brazos":70,"compresion":88,"postura_general":75}}'+SKELETON_INSTRUCTION_BASE
};

var SKELETON_INSTRUCTION_EN='\n\nIMPORTANT FOR SKELETON: Carefully observe if the person is SITTING, STANDING, BENT OVER, or in another posture. Return REAL coordinates as percentages 0-100 of the image. Only include joints that are VISIBLE in the image. If a joint is not visible (example: legs under desk, ankles not visible), OMIT it from the JSON. DO NOT invent positions. If sitting, knees will be bent forward. If person is from behind, in profile, or partially covered, only mark visible parts. Color of each joint: "verde" (correct), "amarillo" (to improve), "rojo" (critical). Add "esqueleto" to JSON only with visible joints. Available joints: cabeza, cuello, hombro_izq, hombro_der, codo_izq, codo_der, muneca_izq, muneca_der, cadera_izq, cadera_der, rodilla_izq, rodilla_der, tobillo_izq, tobillo_der.';

var PROMPTS_EN={
  oficina:'You are a certified ergonomist. Analyze image of worker in OFFICE. Use INCHES for measurements. Evaluate: neck (flexion <20 degrees), shoulders, elbows (90 degrees), neutral wrists, back with lumbar support, hip/knees (90 degrees), feet supported. Monitor distance 20-28 inches. Respond ONLY in English with valid JSON without markdown:\n{"puntuacion":85,"nivel":"Low Risk","resumen":"text","hallazgos_criticos":["h1"],"hallazgos_moderados":["h1"],"puntos_positivos":["p1"],"recomendaciones":["r1"],"segmentos":{"neck":75,"shoulders":90,"elbows":85,"trunk":80,"hips":88,"wrists":70}}'+SKELETON_INSTRUCTION_EN,
  manufactura:'You are a certified ergonomist. Analyze image of worker in MANUFACTURING. Use INCHES and POUNDS (lbs). Evaluate: neck flexion <20 degrees, trunk, arms, wrists, standing posture, comfort zone, load handling (max 55 lbs men, 33 lbs women). Respond ONLY in English with valid JSON without markdown:\n{"puntuacion":85,"nivel":"Low Risk","resumen":"text","hallazgos_criticos":["h1"],"hallazgos_moderados":["h1"],"puntos_positivos":["p1"],"recomendaciones":["r1"],"segmentos":{"neck":75,"trunk":80,"arms":85,"wrists":70,"standing":88,"comfort_zone":75}}'+SKELETON_INSTRUCTION_EN,
  almacen:'You are a certified ergonomist. Analyze image of worker in WAREHOUSE. Use INCHES and POUNDS (lbs). Evaluate: lifting technique, load position, trunk twisting, neck, knees, equipment use. Respond ONLY in English with valid JSON without markdown:\n{"puntuacion":85,"nivel":"Low Risk","resumen":"text","hallazgos_criticos":["h1"],"hallazgos_moderados":["h1"],"puntos_positivos":["p1"],"recomendaciones":["r1"],"segmentos":{"lifting":75,"load_position":80,"trunk":85,"neck":70,"knees":88,"general_posture":75}}'+SKELETON_INSTRUCTION_EN,
  mecanica:'You are a certified ergonomist. Analyze image of worker in MECHANIC area. Use INCHES and POUNDS (lbs). Evaluate: access posture, tool grip, wrist, trunk, squatting, arms overhead, PPE. Respond ONLY in English with valid JSON without markdown:\n{"puntuacion":85,"nivel":"Low Risk","resumen":"text","hallazgos_criticos":["h1"],"hallazgos_moderados":["h1"],"puntos_positivos":["p1"],"recomendaciones":["r1"],"segmentos":{"access":75,"tools":80,"trunk":85,"arms":70,"compression":88,"general_posture":75}}'+SKELETON_INSTRUCTION_EN
};

var COLOR_MAP={verde:'#3B6D11',amarillo:'#EF9F27',rojo:'#E24B4A'};

function setLang(l){
  lang=l;
  document.getElementById('btn-es').classList.toggle('on',l==='es');
  document.getElementById('btn-en').classList.toggle('on',l==='en');
  document.documentElement.lang=l;
  var t=T[l];
  document.getElementById('t-title').textContent=t.title;
  document.getElementById('t-subtitle').textContent=t.subtitle;
  document.getElementById('t-worker').textContent=t.worker;
  document.getElementById('t-name').textContent=t.name;
  document.getElementById('t-role').textContent=t.role;
  document.getElementById('t-eval').textContent=t.eval;
  document.getElementById('t-date').textContent=t.date;
  document.getElementById('tab-oficina').textContent=t.oficina;
  document.getElementById('tab-manufactura').textContent=t.manufactura;
  document.getElementById('tab-almacen').textContent=t.almacen;
  document.getElementById('tab-mecanica').textContent=t.mecanica;
  document.getElementById('t-capture').textContent=t.capture;
  document.getElementById('t-drop').innerHTML=t.drop;
  document.getElementById('t-cam').textContent=t.cam;
  document.getElementById('t-file').textContent=t.file;
  document.getElementById('t-take').textContent=t.take;
  document.getElementById('t-cancel').textContent=t.cancel;
  document.getElementById('t-remove').textContent=t.remove;
  document.getElementById('btn-frame').textContent=t.frame;
  document.getElementById('btn-analyze').textContent=t.analyze;
  document.getElementById('t-result').textContent=t.result;
  document.getElementById('t-empty-text').innerHTML=t.empty;
  document.getElementById('t-history').textContent=t.history;
  document.getElementById('t-lg-ok').textContent=t.lgOk;
  document.getElementById('t-lg-warn').textContent=t.lgWarn;
  document.getElementById('t-lg-bad').textContent=t.lgBad;
  var ph=PLACEHOLDERS[l];
  document.getElementById('wname').placeholder=ph.wname;
  document.getElementById('wrole').placeholder=ph.wrole;
  document.getElementById('weval').placeholder=ph.weval;
  if(lastResult)renderResult(lastResult);
}

function init(){document.getElementById('wdate').value=new Date().toISOString().split('T')[0];setLang('es');}
function setArea(a,b){area=a;document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});b.classList.add('on');}
function handleFile(f){if(!f)return;isVideo=f.type.indexOf('video')===0;var r=new FileReader();r.onload=function(e){dataUrl=e.target.result;showPreview();};r.readAsDataURL(f);}

function showPreview(){
  document.getElementById('idle-section').style.display='none';
  document.getElementById('cam-section').style.display='none';
  document.getElementById('prev-section').style.display='block';
  var box=document.getElementById('prev-box'),tag=document.getElementById('media-tag');
  var old=box.querySelector('img,video');if(old)old.remove();
  document.getElementById('skeleton-svg').style.display='none';
  document.getElementById('legend').style.display='none';
  if(isVideo){
    var v=document.createElement('video');v.src=dataUrl;v.controls=true;v.style.cssText='width:100%;max-height:380px;object-fit:contain';
    box.insertBefore(v,box.firstChild);tag.textContent=lang==='es'?'video':'video';
    document.getElementById('btn-frame').style.display='inline-flex';
  } else {
    var img=document.createElement('img');img.src=dataUrl;img.style.cssText='width:100%;max-height:380px;object-fit:contain';
    box.insertBefore(img,box.firstChild);tag.textContent=lang==='es'?'foto':'photo';
    document.getElementById('btn-frame').style.display='none';
  }
  document.getElementById('btn-analyze').disabled=false;
}

function captureFrame(){var v=document.querySelector('#prev-box video');if(!v)return;var c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);snaps.push({d:c.toDataURL('image/jpeg',.85),ts:Math.round(v.currentTime)});renderSnaps();}
function renderSnaps(){if(!snaps.length)return;document.getElementById('snaps-wrap').style.display='block';document.getElementById('snap-list').innerHTML=snaps.map(function(s,i){return '<img class="snap" src="'+s.d+'" onclick="selectSnap('+i+')"/>';}).join('');}
function selectSnap(i){dataUrl=snaps[i].d;isVideo=false;showPreview();}

function resetMedia(){
  dataUrl=null;isVideo=false;snaps=[];lastResult=null;
  document.getElementById('idle-section').style.display='block';
  document.getElementById('prev-section').style.display='none';
  document.getElementById('snaps-wrap').style.display='none';
  document.getElementById('file-in').value='';
  document.getElementById('res-idle').style.display='block';
  document.getElementById('res-loading').style.display='none';
  document.getElementById('res-content').style.display='none';
}

function openCam(){navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(s){camStream=s;document.getElementById('cam-vid').srcObject=s;document.getElementById('idle-section').style.display='none';document.getElementById('cam-section').style.display='block';}).catch(function(){alert(lang==='es'?'No se pudo acceder a la camara':'Camera access failed');});}
function takePic(){var v=document.getElementById('cam-vid'),c=document.getElementById('cam-canvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);dataUrl=c.toDataURL('image/jpeg',.92);isVideo=false;stopCam();showPreview();}
function stopCam(){if(camStream){camStream.getTracks().forEach(function(t){t.stop();});camStream=null;}document.getElementById('cam-section').style.display='none';document.getElementById('idle-section').style.display='block';}

function drawSkeleton(esq){
  if(!esq)return;
  var svg=document.getElementById('skeleton-svg');
  var img=document.querySelector('#prev-box img');
  if(!img)return;
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('preserveAspectRatio','none');
  svg.style.width=img.offsetWidth+'px';
  svg.style.height=img.offsetHeight+'px';
  svg.style.left=img.offsetLeft+'px';
  svg.style.top=img.offsetTop+'px';
  var connections=[['cabeza','cuello'],['cuello','hombro_izq'],['cuello','hombro_der'],['hombro_izq','codo_izq'],['codo_izq','muneca_izq'],['hombro_der','codo_der'],['codo_der','muneca_der'],['cuello','cadera_izq'],['cuello','cadera_der'],['cadera_izq','cadera_der'],['cadera_izq','rodilla_izq'],['rodilla_izq','tobillo_izq'],['cadera_der','rodilla_der'],['rodilla_der','tobillo_der']];
  var lines='';
  connections.forEach(function(c){
    var a=esq[c[0]],b=esq[c[1]];
    if(a&&b&&typeof a.x==='number'&&typeof b.x==='number'){
      var color=worstColor(a.color,b.color);
      lines+='<line x1="'+a.x+'" y1="'+a.y+'" x2="'+b.x+'" y2="'+b.y+'" stroke="'+COLOR_MAP[color]+'" stroke-width="0.8" stroke-linecap="round" opacity="0.85"/>';
    }
  });
  var dots='';
  Object.keys(esq).forEach(function(k){
    var p=esq[k];
    if(p&&typeof p.x==='number'){
      dots+='<circle cx="'+p.x+'" cy="'+p.y+'" r="1.2" fill="'+COLOR_MAP[p.color||'verde']+'" stroke="white" stroke-width="0.3"/>';
    }
  });
  svg.innerHTML=lines+dots;
  svg.style.display='block';
  document.getElementById('legend').style.display='flex';
}

function worstColor(a,b){if(a==='rojo'||b==='rojo')return 'rojo';if(a==='amarillo'||b==='amarillo')return 'amarillo';return 'verde';}

function analyze(){
  if(!dataUrl){alert(lang==='es'?'Sube imagen primero':'Upload image first');return;}
  var btn=document.getElementById('btn-analyze');btn.disabled=true;btn.textContent=T[lang].analyzing;
  document.getElementById('res-idle').style.display='none';
  document.getElementById('res-content').style.display='none';
  document.getElementById('res-loading').style.display='block';
  var base64=dataUrl.split(',')[1];
  var mime=(dataUrl.match(/data:([^;]+);/)||[])[1]||'image/jpeg';
  var prompt=lang==='es'?PROMPTS_ES[area]:PROMPTS_EN[area];
  fetch('/api/analyze',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-5',
      max_tokens:1500,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mime,data:base64}},
        {type:'text',text:prompt}
      ]}]
    })
  }).then(function(r){return r.json();}).then(function(data){
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('');
    var r;try{r=JSON.parse(text.replace(/```json|```/g,'').trim());}catch(e){r={puntuacion:0,nivel:'Error',resumen:T[lang].errorProc,hallazgos_criticos:[],hallazgos_moderados:[],puntos_positivos:[],recomendaciones:[T[lang].errorRetry],segmentos:{}};}
    lastResult=r;
    renderResult(r);
    if(r.esqueleto)setTimeout(function(){drawSkeleton(r.esqueleto);},100);
    addHist(r);
    btn.disabled=false;btn.textContent=T[lang].analyze;
  }).catch(function(){
    document.getElementById('res-loading').style.display='none';
    document.getElementById('res-content').style.display='block';
    document.getElementById('res-content').innerHTML='<div class="empty" style="color:#A32D2D">'+T[lang].errorConn+'</div>';
    btn.disabled=false;btn.textContent=T[lang].analyze;
  });
}

function sc(s){return s>=75?'#3B6D11':s>=50?'#854F0B':'#A32D2D';}
function bc(s){return s>=75?'#639922':s>=50?'#EF9F27':'#E24B4A';}
function lc(n){if(!n)return'ok';var l=n.toLowerCase();if(l.indexOf('bajo')>=0||l.indexOf('low')>=0||l.indexOf('acepta')>=0)return'ok';if(l.indexOf('moder')>=0)return'warn';return'bad';}
function ml(arr,c){var t=T[lang];if(!arr||!arr.length)return '<li class="fi"><span class="dot" style="background:#ccc"></span><span style="color:#aaa">'+t.none+'</span></li>';return arr.map(function(x){return '<li class="fi"><span class="dot" style="background:'+c+'"></span><span>'+x+'</span></li>';}).join('');}

function renderResult(r){
  var t=T[lang];
  var segs=r.segmentos||{};
  var sh=Object.keys(segs).map(function(k){var v=segs[k];return '<div class="seg"><div class="seg-lbl">'+k.replace(/_/g,' ')+'</div><div class="seg-row"><span class="seg-val" style="color:'+sc(v)+'">'+v+'%</span><div class="bar-track"><div class="bar-fill" style="width:'+v+'%;background:'+bc(v)+'"></div></div></div></div>';}).join('');
  var html='<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div class="score-big" style="color:'+sc(r.puntuacion)+'">'+r.puntuacion+'%</div><div><span class="badge '+lc(r.nivel)+'">'+r.nivel+'</span><p style="font-size:12px;color:#666;margin-top:5px;line-height:1.5">'+r.resumen+'</p></div></div>';
  if(Object.keys(segs).length)html+='<div class="seg-grid">'+sh+'</div>';
  html+='<div class="findings"><h4 style="color:#A32D2D">'+t.critical+'</h4><ul class="fi-list">'+ml(r.hallazgos_criticos,'#E24B4A')+'</ul></div>';
  html+='<div class="findings"><h4 style="color:#854F0B">'+t.moderate+'</h4><ul class="fi-list">'+ml(r.hallazgos_moderados,'#EF9F27')+'</ul></div>';
  html+='<div class="findings"><h4 style="color:#3B6D11">'+t.positive+'</h4><ul class="fi-list">'+ml(r.puntos_positivos,'#639922')+'</ul></div>';
  html+='<div class="findings"><h4 style="color:#185FA5">'+t.recommendations+'</h4><ul class="fi-list">'+ml(r.recomendaciones,'#378ADD')+'</ul></div>';
  html+='<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap"><button class="btn btn-green" onclick="exportPDF()">'+t.pdf+'</button></div>';
  document.getElementById('res-loading').style.display='none';
  document.getElementById('res-content').style.display='block';
  document.getElementById('res-content').innerHTML=html;
}

function addHist(r){var t=T[lang];hist.unshift({thumb:dataUrl,name:document.getElementById('wname').value||t.workerDef,role:document.getElementById('wrole').value||area,score:r.puntuacion,nivel:r.nivel,ts:new Date().toLocaleTimeString(lang,{hour:'2-digit',minute:'2-digit'})});document.getElementById('hist-card').style.display='block';document.getElementById('hist-list').innerHTML=hist.slice(0,8).map(function(e){return '<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #eee"><img src="'+e.thumb+'" style="width:44px;height:36px;object-fit:cover;border-radius:6px"/><div style="flex:1"><div style="font-size:13px;font-weight:600">'+e.name+'</div><div style="font-size:11px;color:#999">'+e.role+' - '+e.ts+'</div></div><div style="font-size:18px;font-weight:700;color:'+sc(e.score)+'">'+e.score+'%</div></div>';}).join('');}

function getSkeletonImage(callback){
  var img=document.querySelector('#prev-box img');
  if(!img||!lastResult||!lastResult.esqueleto){callback(dataUrl);return;}
  var c=document.createElement('canvas');
  var iw=img.naturalWidth,ih=img.naturalHeight;
  c.width=iw;c.height=ih;
  var ctx=c.getContext('2d');
  ctx.drawImage(img,0,0,iw,ih);
  var esq=lastResult.esqueleto;
  var connections=[['cabeza','cuello'],['cuello','hombro_izq'],['cuello','hombro_der'],['hombro_izq','codo_izq'],['codo_izq','muneca_izq'],['hombro_der','codo_der'],['codo_der','muneca_der'],['cuello','cadera_izq'],['cuello','cadera_der'],['cadera_izq','cadera_der'],['cadera_izq','rodilla_izq'],['rodilla_izq','tobillo_izq'],['cadera_der','rodilla_der'],['rodilla_der','tobillo_der']];
  ctx.lineWidth=Math.max(3,iw/200);ctx.lineCap='round';
  connections.forEach(function(co){
    var a=esq[co[0]],b=esq[co[1]];
    if(a&&b&&typeof a.x==='number'&&typeof b.x==='number'){
      var color=worstColor(a.color,b.color);
      ctx.strokeStyle=COLOR_MAP[color];ctx.globalAlpha=0.85;
      ctx.beginPath();ctx.moveTo(a.x*iw/100,a.y*ih/100);ctx.lineTo(b.x*iw/100,b.y*ih/100);ctx.stroke();
    }
  });
  ctx.globalAlpha=1;
  Object.keys(esq).forEach(function(k){
    var p=esq[k];
    if(p&&typeof p.x==='number'){
      ctx.fillStyle=COLOR_MAP[p.color||'verde'];ctx.strokeStyle='white';ctx.lineWidth=Math.max(1,iw/400);
      ctx.beginPath();ctx.arc(p.x*iw/100,p.y*ih/100,Math.max(4,iw/150),0,Math.PI*2);ctx.fill();ctx.stroke();
    }
  });
  callback(c.toDataURL('image/jpeg',0.9));
}

function exportPDF(){
  if(!lastResult){alert(lang==='es'?'Primero analiza una imagen':'Analyze an image first');return;}
  var t=T[lang];
  getSkeletonImage(function(imgData){
    var jsPDF=window.jspdf.jsPDF;
    var doc=new jsPDF();
    var pw=doc.internal.pageSize.getWidth();
    var ph=doc.internal.pageSize.getHeight();
    var name=document.getElementById('wname').value||t.noNameDef;
    var role=document.getElementById('wrole').value||'-';
    var ev=document.getElementById('weval').value||'-';
    var date=document.getElementById('wdate').value||'-';
    var r=lastResult;
    var areaName=t[area]||area;
    doc.setFillColor(24,95,165);doc.rect(0,0,pw,28,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
    doc.text(t.pdfTitle,pw/2,13,{align:'center'});
    doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text(t.pdfSubtitle,pw/2,21,{align:'center'});
    doc.setTextColor(40,40,40);
    var y=38;
    doc.setFontSize(11);doc.setFont('helvetica','bold');doc.text(t.pdfWorker,14,y);
    y+=2;doc.setDrawColor(220,220,220);doc.line(14,y,pw-14,y);y+=6;
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text(t.pdfName+': '+name,14,y);doc.text(t.pdfRole+': '+role,pw/2,y);y+=5;
    doc.text(t.pdfEval+': '+ev,14,y);doc.text(t.pdfDate+': '+date,pw/2,y);y+=5;
    doc.text(t.pdfArea+': '+areaName,14,y);y+=8;
    var imgW=pw-28,imgH=70;
    try{doc.addImage(imgData,'JPEG',14,y,imgW,imgH);}catch(e){}
    y+=imgH+3;
    doc.setFontSize(8);doc.setTextColor(100,100,100);
    doc.text(t.pdfLegend,pw/2,y,{align:'center'});y+=8;
    doc.setFillColor(245,245,242);doc.rect(14,y,pw-28,18,'F');
    doc.setTextColor(40,40,40);doc.setFontSize(24);doc.setFont('helvetica','bold');
    doc.text(r.puntuacion+'%',20,y+13);
    doc.setFontSize(11);doc.text(r.nivel||'',55,y+8);
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(doc.splitTextToSize(r.resumen||'',pw-75),55,y+13);y+=24;
    if(r.segmentos&&Object.keys(r.segmentos).length){
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(40,40,40);
      doc.text(t.pdfSegments,14,y);y+=6;
      doc.setFontSize(8);doc.setFont('helvetica','normal');
      Object.keys(r.segmentos).forEach(function(k){
        var v=r.segmentos[k];var lab=k.replace(/_/g,' ');
        doc.text(lab,14,y);
        var col=v>=75?[59,109,17]:v>=50?[133,79,11]:[163,45,45];
        doc.setFillColor(230,230,230);doc.rect(60,y-3,80,3,'F');
        doc.setFillColor(col[0],col[1],col[2]);doc.rect(60,y-3,80*v/100,3,'F');
        doc.setTextColor(col[0],col[1],col[2]);doc.text(v+'%',145,y);
        doc.setTextColor(40,40,40);y+=5;
      });y+=3;
    }
    if(y>240){doc.addPage();y=20;}
    if(r.hallazgos_criticos&&r.hallazgos_criticos.length){
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(163,45,45);
      doc.text(t.critical,14,y);y+=5;
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
      r.hallazgos_criticos.forEach(function(h){var lines=doc.splitTextToSize('• '+h,pw-28);doc.text(lines,14,y);y+=lines.length*4+1;});y+=2;
    }
    if(y>240){doc.addPage();y=20;}
    if(r.hallazgos_moderados&&r.hallazgos_moderados.length){
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(133,79,11);
      doc.text(t.moderate,14,y);y+=5;
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
      r.hallazgos_moderados.forEach(function(h){var lines=doc.splitTextToSize('• '+h,pw-28);doc.text(lines,14,y);y+=lines.length*4+1;});y+=2;
    }
    if(y>240){doc.addPage();y=20;}
    if(r.puntos_positivos&&r.puntos_positivos.length){
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(59,109,17);
      doc.text(t.positive,14,y);y+=5;
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
      r.puntos_positivos.forEach(function(h){var lines=doc.splitTextToSize('• '+h,pw-28);doc.text(lines,14,y);y+=lines.length*4+1;});y+=2;
    }
    if(y>240){doc.addPage();y=20;}
    if(r.recomendaciones&&r.recomendaciones.length){
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(24,95,165);
      doc.text(t.recommendations,14,y);y+=5;
      doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);
      r.recomendaciones.forEach(function(h){var lines=doc.splitTextToSize('• '+h,pw-28);doc.text(lines,14,y);y+=lines.length*4+1;});
    }
    doc.setFontSize(7);doc.setTextColor(150,150,150);
    doc.text(t.pdfFooter,pw/2,ph-10,{align:'center'});
    doc.text(new Date().toLocaleString(lang),pw/2,ph-6,{align:'center'});
    doc.save('ergonomia_'+name.replace(/\s/g,'_')+'_'+date+'.pdf');
  });
}

init();
</script>
